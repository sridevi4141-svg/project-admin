<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Billing</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Cashier Billing System</h1>
<h3 id="dateTime"></h3>
<!-- Product List -->

<h2>Available Products</h2><br>
<input
    type="text"
    id="search"
    placeholder="Search Product..."
    onkeyup="searchProduct()"
> <br><br>

<table>

<thead>

<tr>
<th>Image</th>
<th>Product</th>
<th>salesPrice</th>
<th>purchasePrice</th>
<th>Action</th>
</tr>

</thead>

<tbody id="productList">

</tbody>

</table>

<br><br>

<!-- Bill Section -->

<h2>Customer Bill</h2>

<table>

<thead>

<tr>
<th>Product</th>
<th>purchasePrice</th>
<th>salesPrice</th>

<th>Qty</th>
<th>Total</th>
</tr>

</thead>

<tbody id="billTable">

</tbody>

</table>

<br>

<h2 id="grandTotal">
Grand Total : ₹0
</h2>

<br>

<button onclick="clearBill()">
Clear Bill
</button>

<button onclick="printBill()">
Print Bill
</button>

</div>



<script src="billing.js"></script>

</body>
</html>
