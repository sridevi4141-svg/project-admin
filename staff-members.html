<!DOCTYPE html>
<html>
<head>
    <title>Staff Members</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>👨‍💼 Staff Members</h2>

    <div class="form-box">

        <input type="text" id="staffName" placeholder="Staff Name">

        <input type="text" id="staffPhone" placeholder="Phone Number">

        <input type="text" id="staffUsername" placeholder="Username">

        <input type="password" id="staffPassword" placeholder="Password">
          
        
        
        <button onclick="saveStaff()">Save Staff</button>

    </div>

    <br>

    <table border="1" width="100%" cellspacing="0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>User</th>
                
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="staffTable">

        </tbody>

    </table>

</div>

<script type="module" src="staff.js"></script>

</body>
</html>
