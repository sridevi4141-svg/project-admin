<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Billing</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<div class="container">
 


<h1>Cashier Billing System</h1>
<h3 id="dateTime"></h3>
<!-- Product List -->

<h2>Available Products</h2><br>
<div class="barcode-box">
    <input 
      type="text" 
      id="barcodeInput" 
      placeholder="Scan Barcode"
      autofocus>
</div>
<br>
<input
    type="text"
    id="search"
    placeholder="Search Product..."
    onkeyup="searchProduct()"
> <br><br>

<table>

<thead>

<tr>
<th>Image</th>
<th>Product</th>
<th>salesPrice</th>
<th>purchasePrice</th>
<th>Quantity</th>
<th>barcode</th>
<th>Action</th>
</tr>

</thead>

<tbody id="productList">

</tbody>

</table>

<br><br>

<!-- Bill Section -->

<h2>Customer Bill</h2>

<table style="width:100%;border-collapse:collapse;">
    <tbody id="billTable">
    </tbody>
</table>


<br>

<h2 id="grandTotal">
Grand Total : ₹0
</h2>

<button onclick="clearBill()">
Clear Bill
</button>

<button onclick="printBill()">
Print Bill
</button>
  


<!-- ===================== PRINT AREA ===================== -->

<div id="printArea" style="display:none;">

    <div class="receipt">

    <h2 style="text-align:center;margin:0;">
        SRI DHANA LAKSHMI RICE
    </h2>

    <h3 style="text-align:center;margin:0;">
        AND GENERAL STORE
    </h3>

    <p style="text-align:center;margin:3px 0;">
        Suryanarayanapuram - 533344
    </p>

    <p style="text-align:center;margin:3px 0;">
        Ph : 9652209111
    </p>

    <hr>

    <div style="display:flex;justify-content:space-between;">
        <span><b>Invoice :</b> <span id="invoiceNo"></span></span>
        <span id="date"></span>
    </div>

    <hr>

    <table style="width:100%;border-collapse:collapse;">

        <tbody id="billItems">

        </tbody>

    </table>

    <hr>

    <h2 style="text-align:right;">
        Grand Total : ₹<span id="grandTotal">0</span>
    </h2>

    <p style="text-align:center;font-weight:bold;">
        Thank You Visit Again
    </p>

</div>
</div>

<!-- ===================== END PRINT ===================== -->
</div>
    
<script type="module" src="billing.js"></script>



</script>

</body>
</html>
